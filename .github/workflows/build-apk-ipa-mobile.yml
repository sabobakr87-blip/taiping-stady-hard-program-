name: Build EXE and APK Only

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: 3.12.2

jobs:
  # --- 1. بناء نسخة الويندوز EXE ---
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview

    - name: Build EXE
      run: |
        # الأمر ده بيطلع ملف واحد بأيقونة وبدون شاشة سوداء
        pyinstaller --noconsole --onefile --icon="logo.ico" --add-data "logo.ico;." --name "TaipingStudy" main.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Version-EXE
        path: dist/TaipingStudy.exe

  # --- 2. بناء نسخة الأندرويد APK ---
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev zlib1g-dev libgstreamer1.0-dev
        pip install --user --upgrade buildozer cython

    - name: Build APK with Buildozer
      run: |
        # إنشاء ملف الإعدادات لو مش موجود وتعديله برمجياً
        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/^title = .*/title = TaipingStudy/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = taiping/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy,webview/' buildozer.spec
          sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
        fi
        # أمر بناء الأندرويد (بياخد وقت شوية)
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Android-Version-APK
        path: bin/*.apk
