name: Android APK Only

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # نسخة مستقرة لبناء الأندرويد

    - name: Install Essential Tools
      run: |
        sudo apt-get update
        # تثبيت الأدوات الأساسية فقط لتقليل فرص التعارض
        sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk-headless
        pip install --upgrade pip
        pip install setuptools "cython<3.0" buildozer

    - name: Build APK with Buildozer
      run: |
        # إنشاء ملف الإعدادات لو مش موجود
        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/^requirements = .*/requirements = python3,kivy,webview/' buildozer.spec
          sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^android.archs = .*/android.archs = arm64-v8a/' buildozer.spec
          # تعيين صورتك 0.png كأيقونة
          if [ -f "0.png" ]; then
            sed -i 's/#icon.filename = .*/icon.filename = %(source.dir)s\/0.png/' buildozer.spec
          fi
        fi
        
        # مسح أي ملفات قديمة معطوبة والبدء من الصفر
        rm -rf .buildozer
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Android-App-APK
        path: bin/*.apk
