name: Build EXE and APK Only

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: 3.12.2

jobs:
  # --- 1. بناء نسخة الويندوز (تم بنجاح سابقاً ولكن نؤكد عليه) ---
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview

    - name: Build EXE
      run: |
        # التأكد من استخدام الأيقونة لو موجودة
        if (Test-Path "logo.ico") {
          pyinstaller --noconsole --onefile --icon="logo.ico" --add-data "logo.ico;." --name "TaipingStudy" main.py
        } else {
          pyinstaller --noconsole --onefile --name "TaipingStudy" main.py
        }

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App
        path: dist/TaipingStudy.exe

  # --- 2. بناء نسخة الأندرويد (حل مشكلة الفشل) ---
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev zlib1g-dev libgstreamer1.0-dev openjdk-17-jdk-headless zip unzip
        pip install --upgrade pip
        pip install setuptools cython buildozer

    - name: Build APK
      run: |
        # إنشاء ملف الإعدادات وضبط التراخيص
        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/^requirements = .*/requirements = python3,kivy,webview/' buildozer.spec
          sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^android.archs = .*/android.archs = arm64-v8a, armeabi-v7a/' buildozer.spec
        fi
        
        # تنظيف أي بناء قديم فاشل
        buildozer android clean
        # محاولة البناء مع عرض تفاصيل الخطأ لو حصل
        buildozer -v android debug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Android-App
        path: bin/*.apk
