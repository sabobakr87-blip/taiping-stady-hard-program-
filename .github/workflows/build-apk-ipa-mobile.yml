name: Build EXE and APK Only

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- 1. بناء نسخة الويندوز (تحويل PNG لـ ICO واستخدامها) ---
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview pillow # أضفنا pillow لتحويل الصورة

    - name: Convert PNG to ICO and Build
      run: |
        # التأكد من وجود الصورة الأصلية
        if (Test-Path "0.png") {
          # كود بايثون سريع لتحويل 0.png لـ logo.ico بمقاسات مناسبة
          python -c "from PIL import Image; img = Image.open('0.png'); img.save('logo.ico', format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])"
          # بناء الـ EXE باستخدام الأيقونة الجديدة
          pyinstaller --noconsole --onefile --icon="logo.ico" --add-data "logo.ico;." --name "TaipingStudy" main.py
        } else {
          pyinstaller --noconsole --onefile --name "TaipingStudy" main.py
        }

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App
        path: dist/TaipingStudy.exe

  # --- 2. بناء نسخة الأندرويد (استخدام PNG للأيقونة) ---
  build-android:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev zlib1g-dev libgstreamer1.0-dev openjdk-17-jdk-headless zip unzip autoconf automake libtool pkg-config libncurses5-dev libncursesw5-dev cmake
        pip install --upgrade pip
        pip install setuptools cython buildozer

    - name: Build APK
      run: |
        # تهيئة الإعدادات وضبط الأيقونة
        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/^requirements = .*/requirements = python3,kivy,webview/' buildozer.spec
          sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          # تعديل أيقونة الأندرويد لتكون 0.png
          if [ -f "0.png" ]; then
            sed -i 's/#icon.filename = .*/icon.filename = %(source.dir)s\/0.png/' buildozer.spec
          fi
        fi
        
        # التنظيف وبناء الأندرويد
        buildozer android debug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Android-App
        path: bin/*.apk
