name: Android APK Only

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev zlib1g-dev libgstreamer1.0-dev openjdk-17-jdk-headless zip unzip autoconf automake libtool pkg-config libncurses5-dev libncursesw5-dev cmake
        pip install --upgrade pip
        pip install setuptools "cython<3.0" buildozer

    - name: Build APK
      run: |
        # إنشاء ملف الإعدادات لو مش موجود
        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/^requirements = .*/requirements = python3,kivy,webview/' buildozer.spec
          sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^android.archs = .*/android.archs = arm64-v8a/' buildozer.spec
          if [ -f "0.png" ]; then
            sed -i 's/#icon.filename = .*/icon.filename = %(source.dir)s\/0.png/' buildozer.spec
          fi
        fi
        
        # التنظيف الإجباري
        rm -rf .buildozer
        
        # السطر ده بيحل مشكلة Aidl عن طريق إجبار Buildozer على تحميل الـ SDK بالكامل
        yes | buildozer android debug || true
        # المحاولة النهائية للبناء
        buildozer -v android debug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Android-App-APK
        path: bin/*.apk
